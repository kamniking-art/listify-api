version: "3.9"

services:

  # ── PostgreSQL ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: listify
      POSTGRES_USER: listify
      POSTGRES_PASSWORD: listify
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # ── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # ── FastAPI ──────────────────────────────────────────────────
  api:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://listify:listify@postgres:5432/listify
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      DEBUG: "true"
      USE_LOCAL_STORAGE: "true"
      LOCAL_STORAGE_PATH: /app/storage
    volumes:
      - ./storage:/app/storage
    depends_on:
      - postgres
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Celery Worker ────────────────────────────────────────────
  worker:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://listify:listify@postgres:5432/listify
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      USE_LOCAL_STORAGE: "true"
      LOCAL_STORAGE_PATH: /app/storage
    volumes:
      - ./storage:/app/storage
    depends_on:
      - postgres
      - redis
    command: celery -A app.workers.tasks worker --loglevel=info --concurrency=2

  # ── Celery Beat (cron) ───────────────────────────────────────
  beat:
    build: .
    restart: unless-stopped
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
    depends_on:
      - redis
    command: celery -A app.workers.tasks beat --loglevel=info

volumes:
  postgres_data:
  redis_data:
